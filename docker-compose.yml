version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: iglesia_app
    container_name: iglesia_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_DEBUG: '1'
      DB_HOST: db
      DB_DATABASE: homestead
      DB_USERNAME: homestead
      DB_PASSWORD: secret
    depends_on:
      - db
    networks:
      - iglesia

  nginx:
    image: nginx:alpine
    container_name: iglesia_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - iglesia

  db:
    image: mysql:8.0
    container_name: iglesia_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: homestead
      MYSQL_USER: homestead
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - iglesia

  node:
    image: node:20
    container_name: iglesia_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    networks:
      - iglesia

volumes:
  dbdata:
  vendor:
  node_modules:

networks:
  iglesia:
    driver: bridge
